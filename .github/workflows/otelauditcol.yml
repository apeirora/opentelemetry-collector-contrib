name: otelauditcol

on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
    paths:
      - ".github/workflows/otelauditcol.yml"
      - "cmd/otelauditcol/**"
      - "receiver/auditlogreceiver/**"
      - "processor/certificatelogverifyprocessor/**"
      - "extension/storage/redisstorageextension/**"
      - "internal/buildscripts/ocb-add-replaces.sh"
      - "Makefile"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional extra tag (e.g. my-test). Default is test-<branch>."
        required: false
        type: string

env:
  IMAGE: ghcr.io/apeirora/opentelemetry-collector-contrib/otelauditcol

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-24.04
    if: github.repository == 'apeirora/opentelemetry-collector-contrib'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set release tag
        id: release_tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./.github/workflows/scripts/set_release_tag.sh

      - name: Resolve image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          BRANCH="${GITHUB_REF#refs/heads/}"
          BRANCH_TAG="$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | tr '/' '-' | tr -c 'a-z0-9._-' '-')"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAGS="${{ env.IMAGE }}:test-${BRANCH_TAG}"
            TAGS="${TAGS},${{ env.IMAGE }}:sha-${SHORT_SHA}"
            if [ -n "${{ github.event.inputs.tag }}" ]; then
              TAGS="${TAGS},${{ env.IMAGE }}:${{ github.event.inputs.tag }}"
            fi
          elif [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TAGS="${{ env.IMAGE }}:latest"
            TAGS="${TAGS},${{ env.IMAGE }}:main"
            TAGS="${TAGS},${{ env.IMAGE }}:sha-${SHORT_SHA}"
          else
            TAGS="${{ env.IMAGE }}:sha-${SHORT_SHA}"
          fi

          if [ -n "${{ steps.release_tag.outputs.tag }}" ]; then
            TAGS="${TAGS},${{ env.IMAGE }}:${{ steps.release_tag.outputs.tag }}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Publishing tags: ${TAGS}"

      - name: Build and push otelauditcol
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: cmd/otelauditcol/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/amd64,linux/arm64

      - run: ./.github/workflows/scripts/check-disk-space.sh
