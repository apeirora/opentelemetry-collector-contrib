apiVersion: v1
kind: ServiceAccount
metadata:
  name: otelcol-certificatelogverify
  namespace: otel-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: otelcol-secret-reader
  namespace: otel-demo
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["otelcol-test-certs"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: otelcol-secret-reader
  namespace: otel-demo
subjects:
- kind: ServiceAccount
  name: otelcol-certificatelogverify
  namespace: otel-demo
roleRef:
  kind: Role
  name: otelcol-secret-reader
  apiGroup: rbac.authorization.k8s.io
