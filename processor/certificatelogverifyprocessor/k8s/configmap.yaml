apiVersion: v1
kind: ConfigMap
metadata:
  name: otelcol-config
  namespace: otel-demo
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    
    processors:
      certificatelogverify:
        hash_algorithm: SHA256
        sign_content: body
        k8s_secret:
          name: otelcol-test-certs
          namespace: otel-demo
          cert_key: cert.pem
    
    exporters:
      debug:
        verbosity: detailed
      otlp:
        endpoint: otel-collector:4317
        tls:
          insecure: true
    
    service:
      pipelines:
        logs:
          receivers: [otlp]
          processors: [certificatelogverify]
          exporters: [debug]
