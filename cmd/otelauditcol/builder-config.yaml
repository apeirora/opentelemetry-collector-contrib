# Minimal collector for local audit-log development.
# Build: make otelauditcol
# Run:   ./bin/otelauditcol_windows_amd64.exe --config ./receiver/auditlogreceiver/example-config.yaml

dist:
  module: github.com/open-telemetry/opentelemetry-collector-contrib/cmd/otelauditcol
  name: otelauditcol
  description: Minimal OpenTelemetry Collector for audit log receiver development.
  version: 0.151.0-dev
  output_path: ./cmd/otelauditcol

extensions:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/storage/redisstorageextension v0.151.0

exporters:
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.151.1-0.20260501001745-24aecacf1c04
  - gomod: go.opentelemetry.io/collector/exporter/otlphttpexporter v0.151.1-0.20260501001745-24aecacf1c04

processors:
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.151.1-0.20260501001745-24aecacf1c04
  - gomod: go.opentelemetry.io/collector/processor/memorylimiterprocessor v0.151.1-0.20260501001745-24aecacf1c04
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/certificatelogverifyprocessor v0.151.0

receivers:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/auditlogreceiver v0.151.0

providers:
  - gomod: go.opentelemetry.io/collector/confmap/provider/envprovider v1.57.1-0.20260501001745-24aecacf1c04
  - gomod: go.opentelemetry.io/collector/confmap/provider/fileprovider v1.57.1-0.20260501001745-24aecacf1c04
  - gomod: go.opentelemetry.io/collector/confmap/provider/yamlprovider v1.57.1-0.20260501001745-24aecacf1c04

replaces:
