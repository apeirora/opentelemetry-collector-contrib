apiVersion: v1
kind: Namespace
metadata:
  name: otel-audit
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otelcol-audit
  namespace: otel-audit
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: otelcol-audit-secret-reader
  namespace: otel-audit
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["otelcol-audit-secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: otelcol-audit-secret-reader
  namespace: otel-audit
subjects:
- kind: ServiceAccount
  name: otelcol-audit
  namespace: otel-audit
roleRef:
  kind: Role
  name: otelcol-audit-secret-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
metadata:
  name: otelcol-audit-secrets
  namespace: otel-audit
type: Opaque
stringData:
  hmac.key: "REPLACE_WITH_HMAC_KEY"
  cert.pem: |
    REPLACE_WITH_VERIFICATION_CERTIFICATE_PEM
  tls.crt: |
    REPLACE_WITH_SERVER_CERT_PEM
  tls.key: |
    REPLACE_WITH_SERVER_KEY_PEM
  ca.crt: |
    REPLACE_WITH_CLIENT_CA_PEM
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otelcol-audit-config
  namespace: otel-audit
data:
  config.yaml: |
    extensions:
      redis_storage/wal:
        endpoint: redis:6379
        db: 0
        tls:
          insecure: true
      redis_storage/audit_meta:
        endpoint: redis:6379
        db: 1
        tls:
          insecure: true
    receivers:
      auditlogreceiver:
        endpoint: 0.0.0.0:4310
        path: /v1/audit
        response_mode: sync
        storage: redis_storage/wal
        tls:
          cert_file: /etc/otel/tls/tls.crt
          key_file: /etc/otel/tls/tls.key
          client_ca_file: /etc/otel/tls/ca.crt
          min_version: "1.2"
        circuit_breaker:
          enabled: true
          open_behavior: reject
    processors:
      certificatelogverify:
        mode: sync
        failure_mode: strict
        k8s_secret:
          name: otelcol-audit-secrets
          namespace: otel-audit
          hmac_key_entry: hmac.key
          cert_key: cert.pem
        hash_chain:
          enabled: false
          storage: redis_storage/audit_meta
        dead_letter:
          enabled: true
          storage: redis_storage/audit_meta
          key_prefix: audit_verify_dlq/
          fail_on_storage_error: true
    exporters:
      otlp_http:
        endpoint: http://audit-backend:4318
        timeout: 8s
        sending_queue:
          enabled: false
        retry_on_failure:
          enabled: true
          initial_interval: 500ms
          max_interval: 2s
          max_elapsed_time: 8s
        tls:
          insecure: true
    service:
      telemetry:
        logs:
          level: info
        metrics:
          level: none
      extensions: [redis_storage/wal, redis_storage/audit_meta]
      pipelines:
        logs/audit:
          receivers: [auditlogreceiver]
          processors: [certificatelogverify]
          exporters: [otlp_http]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otelcol-audit
  namespace: otel-audit
  labels:
    app: otelcol-audit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otelcol-audit
  template:
    metadata:
      labels:
        app: otelcol-audit
    spec:
      serviceAccountName: otelcol-audit
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: otelcol
        image: ghcr.io/apeirora/opentelemetry-collector-contrib/otelauditcol:latest
        imagePullPolicy: Always
        args: ["--config=/etc/otel/config.yaml"]
        ports:
        - name: audit-http
          containerPort: 4310
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: config
          mountPath: /etc/otel/config.yaml
          subPath: config.yaml
          readOnly: true
        - name: tls
          mountPath: /etc/otel/tls
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: config
        configMap:
          name: otelcol-audit-config
      - name: tls
        secret:
          secretName: otelcol-audit-secrets
          defaultMode: 0400
          items:
          - key: tls.crt
            path: tls.crt
          - key: tls.key
            path: tls.key
          - key: ca.crt
            path: ca.crt
---
apiVersion: v1
kind: Service
metadata:
  name: otelcol-audit
  namespace: otel-audit
  labels:
    app: otelcol-audit
spec:
  selector:
    app: otelcol-audit
  ports:
  - name: audit-http
    port: 4310
    targetPort: 4310
    protocol: TCP
